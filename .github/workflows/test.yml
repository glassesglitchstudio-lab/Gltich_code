name: test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Configure git identity
        run: |
          git config --global user.email "ci@mimo.ai"
          git config --global user.name "mimo-ci"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-
            turbo-${{ runner.os }}-

      - name: Run unit tests
        timeout-minutes: 20
        run: bun turbo test --output-logs=errors-only --log-order=grouped --log-prefix=task

  smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build binary
        run: bun run --cwd packages/opencode script/build.ts --single
        shell: bash
        timeout-minutes: 5

      - name: Smoke test
        run: |
          chmod +x ./packages/opencode/dist/glitchcode-*/bin/glitch
          ./packages/opencode/dist/glitchcode-*/bin/glitch --version

  os-eval:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: "Ubuntu 22.04 LTS"
          - os: ubuntu-24.04
            name: "Ubuntu 24.04 LTS"
          - os: macos-14
            name: "macOS 14 (ARM)"
          - os: macos-15
            name: "macOS 15 (ARM)"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build binary
        run: bun run --cwd packages/opencode script/build.ts --single
        shell: bash
        timeout-minutes: 5

      - name: "Eval: --version"
        run: |
          chmod +x ./packages/opencode/dist/glitchcode-*/bin/glitch
          ./packages/opencode/dist/glitchcode-*/bin/glitch --version

      - name: "Eval: --help"
        run: ./packages/opencode/dist/glitchcode-*/bin/glitch --help

      - name: "Eval: doctor"
        run: ./packages/opencode/dist/glitchcode-*/bin/glitch doctor || true

      - name: "Eval: models"
        run: ./packages/opencode/dist/glitchcode-*/bin/glitch models || true

      - name: "Eval: binary info"
        run: |
          ls -lh ./packages/opencode/dist/glitchcode-*/bin/glitch
          file ./packages/opencode/dist/glitchcode-*/bin/glitch
