name: VS Code Extension Build

on:
  push:
    paths:
      - 'packages/vscode/**'
  pull_request:
    paths:
      - 'packages/vscode/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vscode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-workspace

      - name: Build extension
        run: bun run build

      - name: Package VSIX
        run: bunx @vscode/vsce package --ignoreFile .vscodeignore

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: packages/vscode/*.vsix
          retention-days: 30

      - name: Display VSIX info
        run: ls -la *.vsix
