name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: false

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: windows-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install node-gyp (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp

      - name: Build binary for ${{ matrix.target }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            bun run --cwd packages/opencode script/build.ts --single --skip-install
          else
            bun run --cwd packages/opencode script/build.ts --single
          fi
        shell: bash
        env:
          MIMOCODE_CHANNEL: prod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: packages/opencode/dist/glitchcode-${{ matrix.target }}/
          retention-days: 5

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/opencode/dist/

      - name: Configure npm for npmjs.com
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Publish glitchcode-cli to npmjs.com
        run: |
          cd packages/opencode
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $PKG_VERSION"
          npm version "$PKG_VERSION" --no-git-tag-version --allow-same-version
          npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            if [ ! -d "$dir" ] || [ -z "$(ls -A "$dir")" ]; then
              echo "Skipping empty artifact: $platform"
              continue
            fi
            if [[ "$platform" == *"windows"* ]]; then
              cd "$dir" && zip -r "$GITHUB_WORKSPACE/release/${platform}.zip" . && cd "$GITHUB_WORKSPACE"
            else
              cd "$dir" && tar -czf "$GITHUB_WORKSPACE/release/${platform}.tar.gz" . && cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
